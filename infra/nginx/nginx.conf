# Nginx serves the static SPA build and reverse-proxies the API. TeamBrewer runs
# behind a TLS-terminating front proxy (Caddy / Traefik / nginx-proxy-manager) on
# the VPS, so this container listens on plain HTTP on the internal network — the
# front proxy owns HTTPS and HSTS. See docs/ops/self-hosting.md.

# Honor the protocol the front proxy already resolved. Without this, hard-coding
# `$scheme` would tell the API "http" and break secure-cookie / HTTPS detection.
map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers for the SPA (docs/architecture/security.md). Set on every
  # response (`always`, so they cover error responses too). HSTS is intentionally
  # NOT set here — the TLS-terminating front proxy owns it (it must only be sent
  # over HTTPS). Card art is loaded from external sanctioned CDNs that vary per
  # game, so img-src allows any HTTPS image; scripts/styles stay locked to self
  # ('unsafe-inline' for styles is required by the Radix/shadcn UI primitives).
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; form-action 'self'" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Forward API calls to the NestJS service on the internal network.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
