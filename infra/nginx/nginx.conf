# Nginx serves the static SPA build and reverse-proxies the API. The API keeps
# its global /api prefix, so the original URI is forwarded unchanged.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Forward API calls to the NestJS service on the internal network.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
