# Self-hosted stack: PostgreSQL + NestJS API + Nginx (serving the web build and
# reverse-proxying /api). Only Nginx is published; Postgres and the API stay on
# the private network. See docs/architecture/overview.md.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: teambrewer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teambrewer}
      POSTGRES_DB: teambrewer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teambrewer -d teambrewer"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      NODE_ENV: production
      API_PORT: 3000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgresql://teambrewer:${POSTGRES_PASSWORD:-teambrewer}@postgres:5432/teambrewer
      # Required. Generate with `openssl rand -base64 32` and set in .env.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      # Public HTTPS URL the app is reached at (behind the TLS front proxy).
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8080}
      # Optional Discord SSO (ADR-0009); leave blank to disable.
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-}
      # Rate-limit overrides (optional; code defaults apply when unset).
      RATE_LIMIT_DEFAULT_LIMIT: ${RATE_LIMIT_DEFAULT_LIMIT:-300}
      RATE_LIMIT_STRICT_LIMIT: ${RATE_LIMIT_STRICT_LIMIT:-20}
      RATE_LIMIT_EXPENSIVE_LIMIT: ${RATE_LIMIT_EXPENSIVE_LIMIT:-60}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-300}
      RATE_LIMIT_AUTH_SIGN_IN_MAX: ${RATE_LIMIT_AUTH_SIGN_IN_MAX:-10}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:

volumes:
  postgres-data:
