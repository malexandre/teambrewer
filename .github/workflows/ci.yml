name: CI

# Runs the same checks that are the local "done" bar. This activates once the
# repository has a GitHub remote; until then, run the equivalent pnpm scripts
# locally (see .claude/rules/git-and-commits.md).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Node + pnpm from mise.toml so CI uses the same pinned toolchain
      # as local development (single source of truth).
      - uses: jdx/mise-action@v2

      - run: pnpm install --frozen-lockfile

      # The Prisma client is generated into apps/api/src/generated (gitignored), so a
      # fresh checkout must generate it before typecheck/build/test can compile. generate
      # is offline (no DB connection); the placeholder URL just satisfies the datasource.
      - run: pnpm --filter @teambrewer/api db:generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      # Dependency audit — fails the build on high-severity (or worse) advisories.
      - run: pnpm audit --audit-level=high

      # Integration tests provision Postgres via Testcontainers, which uses the
      # Docker daemon available on GitHub-hosted runners.
      - run: pnpm test

      # Critical-journey e2e (Playwright) — Testcontainers Postgres + the built API,
      # then chromium + mobile projects. Uses the same Docker daemon as `pnpm test`.
      # The chromium browser + its OS deps must be installed on the runner first.
      - run: pnpm --filter @teambrewer/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
