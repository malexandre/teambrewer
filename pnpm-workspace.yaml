packages:
  - "apps/*"
  - "packages/*"

# Dependencies explicitly allowed to run install scripts (pnpm blocks them by
# default as a supply-chain safeguard). @swc/core compiles its native binding;
# Prisma's packages set up their client/engine.
allowBuilds:
  "@prisma/engines": true
  "@swc/core": true
  prisma: true
  # Optional native/codegen scripts of Testcontainers' transitive deps. Declined:
  # they are dev-only and not needed (Testcontainers uses the local Docker socket,
  # so ssh2's native crypto is never exercised; the JS fallbacks suffice).
  cpu-features: false
  protobufjs: false
  ssh2: false

# Single source of truth for versions shared across packages. Packages reference
# these with "catalog:" so a bump happens in exactly one place. Package-specific
# deps (NestJS, React, Vite, Prisma, …) are pinned directly in their package.json.
catalog:
  "@types/node": 26.1.1
  typescript: 6.0.3
  vitest: 4.1.10
  zod: 4.4.3

minimumReleaseAgeExclude:
  - eslint@10.7.0
