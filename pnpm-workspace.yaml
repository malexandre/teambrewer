packages:
  - "apps/*"
  - "packages/*"

# Dependencies explicitly allowed to run install scripts (pnpm blocks them by
# default as a supply-chain safeguard). @swc/core compiles its native binding;
# Prisma's packages set up their client/engine.
allowBuilds:
  "@prisma/engines": true
  "@swc/core": true
  prisma: true

# Single source of truth for versions shared across packages. Packages reference
# these with "catalog:" so a bump happens in exactly one place. Package-specific
# deps (NestJS, React, Vite, Prisma, …) are pinned directly in their package.json.
catalog:
  "@types/node": 26.1.1
  typescript: 6.0.3
  vitest: 4.1.10
  zod: 4.4.3

minimumReleaseAgeExclude:
  - eslint@10.7.0
